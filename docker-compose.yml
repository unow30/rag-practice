services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rag-practice
      POSTGRES_USER: rag-practice
      POSTGRES_PASSWORD: rag-practice
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag-practice -d rag-practice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
